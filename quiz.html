<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Quiz App</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
   margin:0;
   padding:0;
   box-sizing:border-box;
}

body{

   min-height:100dvh;

   display:flex;
   justify-content:center;
   align-items:center;

   padding:20px;

   overflow-x:hidden;

   font-family:'Poppins',sans-serif;

   background:
      radial-gradient(circle at top left,#39115b 0%,transparent 30%),
      radial-gradient(circle at bottom right,#0b3c74 0%,transparent 25%),
      linear-gradient(135deg,#050816,#170022,#090014);
}



/* QUIZ CONTAINER */

.quiz-container{

   width:100%;

   max-width:900px;

   background:
      rgba(255,255,255,.05);

   border:
      1px solid rgba(255,255,255,.08);

   border-radius:35px;

   padding:35px;

   backdrop-filter:blur(14px);

   box-shadow:
      0 0 30px rgba(0,234,255,.12);
}



/* TOP BAR */

.top-bar{

   display:flex;

   justify-content:space-between;

   align-items:center;

   gap:20px;

   margin-bottom:40px;
}



/* QUIZ INFO */

.topic{

   color:#00eaff;

   font-size:24px;

   font-weight:700;
}

.info{

   display:flex;

   gap:15px;
}

.timer,
.score{

   padding:10px 18px;

   border-radius:30px;

   background:
      rgba(255,255,255,.06);

   border:
      1px solid rgba(255,255,255,.08);

   color:white;

   font-weight:600;
}



/* QUESTION COUNT */

.question-count{

   text-align:center;

   color:#00eaff;

   margin-bottom:15px;

   font-size:18px;
}



/* QUESTION */

.question{

   color:white;

   font-size:34px;

   text-align:center;

   line-height:1.5;

   margin-bottom:35px;
}



/* OPTIONS */

.options{

   display:grid;

   gap:18px;
}

.option{

   padding:18px 22px;

   border-radius:18px;

   background:
      rgba(255,255,255,.05);

   border:
      1px solid rgba(255,255,255,.08);

   color:white;

   cursor:pointer;

   transition:.3s ease;
}

.option:hover{

   transform:translateY(-4px);

   border-color:#00eaff;

   box-shadow:
      0 0 18px rgba(0,234,255,.2);
}



/* ACTIVE OPTION */

.option.active{

   background:
      linear-gradient(
         135deg,
         #00c6ff,
         #0072ff
      );

   border-color:#00eaff;
}



/* BUTTON */

.next-btn{

   margin-top:35px;

   padding:14px 30px;

   border:none;

   border-radius:40px;

   background:
      linear-gradient(
         135deg,
         #00c6ff,
         #0072ff
      );

   color:white;

   font-size:15px;

   font-weight:600;

   cursor:pointer;

   transition:.3s ease;
}

.next-btn:hover{

   transform:translateY(-4px);
}



/* PROGRESS */

.progress{

   width:100%;

   height:10px;

   border-radius:20px;

   overflow:hidden;

   background:
      rgba(255,255,255,.08);

   margin-top:30px;
}

.progress-fill{

   width:0%;

   height:100%;

   background:
      linear-gradient(
         90deg,
         #00eaff,
         #0072ff
      );

   transition:.35s ease;
}



/* RESULT */

.result{

   display:none;

   text-align:center;
}

.result h1{

   color:#00eaff;

   margin-bottom:20px;

   font-size:42px;
}

.result p{

   color:white;

   font-size:24px;

   margin-bottom:25px;
}

.result button{

   padding:14px 30px;

   border:none;

   border-radius:40px;

   background:
      linear-gradient(
         135deg,
         #00c6ff,
         #0072ff
      );

   color:white;

   font-weight:600;

   cursor:pointer;
}



/* RESPONSIVE */

@media(max-width:700px){

   .quiz-container{

      padding:22px;
   }

   .top-bar{

      flex-direction:column;

      gap:15px;
   }

   .question{

      font-size:24px;
   }

   .option{

      padding:15px;

      font-size:14px;
   }

   .next-btn{

      width:100%;
   }

   .result h1{

      font-size:32px;
   }

   .result p{

      font-size:20px;
   }
}

</style>
</head>
<body>

<div class="quiz-container">


   <div id="quiz-area">

      <!-- TOP -->

      <div class="top-bar">

         <div class="topic" id="quizTopic">

         </div>

         <div class="info">

            <div class="timer">

               ⏱
               <span id="time">
                  30
               </span>s

            </div>

            <div class="score">
               ⭐ Score:
               <span id="score">
                  0
               </span>

            </div>

         </div>

      </div>



      <!-- QUESTION COUNT -->

      <div class="question-count">
         Question
         <span id="currentQuestion">
            1
         </span>
         / 10
      </div>



      <!-- QUESTION -->

      <h1 class="question" id="question">  </h1>
      <!-- OPTIONS -->

      <div class="options" id="options">

      </div>



      <!-- BUTTON -->

      <button class="next-btn"  id="nextBtn">
         Next Question
      </button>



      <!-- PROGRESS -->

      <div class="progress">

         <div class="progress-fill"
         id="progressFill">

         </div>

      </div>

   </div>



   <!-- RESULT -->

   <div class="result" id="resultBox">

      <h1>
         🎉 Quiz Completed!
      </h1>

      <p>
         Your Score:
         <span id="finalScore">
         </span>
      </p>

      <button onclick="goHome()">
         Back To Home
      </button>
   </div>
</div>

<script src="data.js"></script>

<script>

const section =
localStorage.getItem('section');

const topic =
localStorage.getItem('topic');

const difficulty =
localStorage.getItem('difficulty');

let timerValue;



if(difficulty === "easy"){
   timerValue = 30;
}else if(difficulty === "medium"){
   timerValue = 20;
}else{
   timerValue = 10;
}

document.getElementById(
   'quizTopic'
).textContent =

`${topic.toUpperCase()} - ${difficulty.toUpperCase()}`;


// console.log(section);

// console.log(topic);

// console.log(difficulty);

// console.log(quizData[section]);

// console.log(quizData[section][topic]);

// console.log(
// quizData[section][topic][difficulty]
// );


const questions =
quizData[section] [topic] [difficulty];

/* SAFETY CHECK */

if(!questions || questions.length === 0){

   alert("Questions not found");

   window.location.href =
   "home.html";
// console.log(section);

// console.log(topic);

// console.log(difficulty);

// console.log(quizData);

// console.log(questions);
}

//per que'

let current = 0;

let score = 0;

let selectedAnswer = null;

let timer = timerValue;


//elements

const question =
document.getElementById('question');

const options =
document.getElementById('options');

const nextBtn =
document.getElementById('nextBtn');

const scoreText =
document.getElementById('score');

const currentQuestion =
document.getElementById(
   'currentQuestion'
);

const progressFill =
document.getElementById(
   'progressFill'
);

const resultBox =
document.getElementById(
   'resultBox'
);

const finalScore =
document.getElementById(
   'finalScore'
);

const quizArea =
document.getElementById(
   'quiz-area'
);

const time =
document.getElementById('time');


//que load
function loadQuestion(){

   selectedAnswer = null;

   const q =
   questions[current];

   question.textContent = q.question;

   currentQuestion.textContent =
   current + 1;


   options.innerHTML = "";



   q.options.forEach((option)=>{

      const div =
      document.createElement('div');

      div.classList.add('option');

      div.textContent = option;

      div.addEventListener('click',()=>{
         document
         .querySelectorAll('.option')
         .forEach((o)=>{
            o.classList.remove('active');
         });
         div.classList.add('active');
         selectedAnswer = option;
      });

      options.appendChild(div);

   });

   progressFill.style.width =
   `${((current + 1)
/ questions.length) * 100}%`;

   resetTimer();
}


nextBtn.addEventListener('click',()=>{

   checkAnswer();

});


function checkAnswer(){

   if(

      selectedAnswer === questions[current].answer

   ){

      score++;
      scoreText.textContent = score;
   }

   current++;

   if(current < questions.length){
      loadQuestion();
   }else{
      endQuiz();
   }

}



function endQuiz(){

   clearInterval(countdown);
   quizArea.style.display = "none";

   resultBox.style.display = "block";

   finalScore.textContent = `${score} / ${questions.length}`;

}



let countdown;

function resetTimer(){

   clearInterval(countdown);
  let timer = timerValue;
   time.textContent = timer;



   countdown = setInterval(()=>{

      timer--;

      time.textContent = timer;

      if(timer <= 0){

         clearInterval(countdown);

         current++;

         if(current < questions.length){

            loadQuestion();

         }else{

            endQuiz();
         }

      }

   },1000);

}



function goHome(){
   window.location.href =
   "home.html";
}



loadQuestion();

</script>
</body>
</html>
